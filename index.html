<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Density</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Density">
<meta name="theme-color" content="#15140F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --ink:#15140F;
    --ink-2:#1D1B14;
    --panel:#24211A;
    --panel-2:#2D2A20;
    --line:#3A352A;
    --copper:#C97B4A;
    --copper-bright:#E89A5F;
    --brass:#B89455;
    --cream:#EDE6D6;
    --cream-dim:#A89E89;
    --green:#7E9468;
    --amber:#D4A24C;
    --red:#B5634A;
    --shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--ink);
    color:var(--cream);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    overscroll-behavior:none;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .screen{
    flex:1; overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    display:none;
    padding: 18px 18px 40px;
  }
  .screen.active{display:flex; flex-direction:column;}

  /* Block screen: fixed header/footer feel, scrollable middle, Save always visible */
  #screen-block.active{
    display:flex; flex-direction:column;
    padding-bottom: 0;
    overflow:hidden;
  }
  #block-scroll{
    flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding: 18px 18px 10px;
  }
  #block-save-wrap{
    flex-shrink:0;
    padding: 12px 18px calc(14px + env(safe-area-inset-bottom));
    background: var(--ink);
    border-top: 1px solid var(--line);
  }

  /* Header */
  .topbar{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom: 18px;
  }
  .brand{
    font-family: Georgia, "Times New Roman", serif;
    font-size: 26px; letter-spacing: 0.5px; color:var(--copper-bright);
    font-style: italic;
  }
  .brand .sub{
    display:block; font-family: -apple-system, sans-serif; font-style:normal;
    font-size: 11px; letter-spacing: 2.5px; color:var(--cream-dim);
    text-transform:uppercase; margin-top:2px;
  }
  .back-btn{
    background:none; border:none; color:var(--cream-dim); font-size:15px;
    display:flex; align-items:center; gap:4px; padding:6px 0;
  }

  /* Week banner */
  .week-banner{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:14px 16px; margin-bottom:18px;
  }
  .week-info .week-num{ font-size:20px; font-weight:700; color:var(--cream); }
  .week-info .week-target{ font-size:12px; color:var(--cream-dim); margin-top:2px; }
  .week-advance-btn{
    background:var(--copper); color:var(--ink-2); border:none; border-radius:11px;
    padding:11px 14px; font-size:13px; font-weight:700; white-space:nowrap;
  }
  .week-advance-btn:active{ background:var(--copper-bright); }

  /* Day grouping */
  .day-group{ margin-bottom: 22px; }
  .day-group-label{
    font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--brass);
    margin: 0 2px 8px;
  }

  /* Block row (tappable, lives on Home) */
  .block-row{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px 16px;
    margin-bottom:10px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    position:relative; overflow:hidden;
  }
  .block-row::before{
    content:"";
    position:absolute; left:0; top:0; bottom:0; width:4px;
    background:var(--copper);
  }
  .block-row:active{ background:var(--panel-2); }
  .block-row-main{ flex:1; min-width:0; }
  .block-row-name{ font-size:16px; font-weight:600; color:var(--cream); margin-bottom:3px; }
  .block-row-meta{ font-size:12.5px; color:var(--cream-dim); }
  .block-row-right{ display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
  .block-row-rounds{ font-size:22px; font-weight:800; color:var(--cream); font-variant-numeric: tabular-nums; }
  .block-row-rounds .unit{ font-size:11px; font-weight:500; color:var(--cream-dim); margin-left:2px; }
  .chevron{ color:var(--cream-dim); font-size:18px; }

  .indicator{
    font-size:10.5px; font-weight:700; letter-spacing:0.5px; padding:3px 8px; border-radius:20px;
  }
  .indicator.up{ background:rgba(212,162,76,0.18); color:var(--amber); }
  .indicator.hold{ background:rgba(126,148,104,0.18); color:var(--green); }
  .indicator.new{ background:var(--panel-2); color:var(--cream-dim); }

  .empty-state{
    text-align:center; color:var(--cream-dim); font-size:14px; margin-top:60px; line-height:1.6;
  }
  .empty-state .big-emoji{ font-size:40px; display:block; margin-bottom:14px; }

  /* Block detail screen */
  .block-header{ text-align:center; margin-bottom: 18px; }
  .block-header-name{ font-size:21px; font-weight:600; color:var(--cream); }
  .block-header-day{ font-size:12px; color:var(--cream-dim); letter-spacing:1.5px; text-transform:uppercase; margin-top:3px;}

  .last-time-banner{
    display:flex; align-items:center; gap:10px;
    background:var(--panel); border:1px solid var(--line);
    border-radius:12px; padding:12px 14px; margin-bottom:16px; font-size:13.5px; color:var(--cream-dim);
  }
  .last-time-banner.up{ border-color:rgba(212,162,76,0.4); background:rgba(212,162,76,0.08); color:var(--amber); }
  .last-time-banner.hold{ border-color:rgba(126,148,104,0.4); background:rgba(126,148,104,0.08); color:var(--green); }

  .exercise-list{ background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:6px 16px; margin-bottom:20px; }
  .exercise-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:13px 0; border-bottom:1px solid var(--line);
  }
  .exercise-row:last-child{ border-bottom:none; }
  .ex-name{ font-size:15px; color:var(--cream); }
  .ex-meta{ font-size:13px; color:var(--cream-dim); }
  .ex-weight-edit{
    width:58px; text-align:center; background:var(--panel-2); color:var(--cream);
    border:1px solid var(--line); border-radius:8px; padding:7px 2px; font-size:15px;
    font-variant-numeric: tabular-nums;
  }

  .round-counter-wrap{
    display:flex; flex-direction:column; align-items:center; gap:14px;
    margin: 6px 0 10px;
  }
  .round-big{
    font-size:88px; font-weight:800; color:var(--copper-bright); line-height:1; font-variant-numeric: tabular-nums;
  }
  .round-target-label{ font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--cream-dim); text-align:center; }
  .round-btn-row{ display:flex; gap:14px; align-items:center; }
  .round-btn{
    width:84px; height:84px; border-radius:50%;
    background:var(--copper); color:var(--ink-2);
    font-size:32px; font-weight:700; border:none;
    box-shadow: var(--shadow);
  }
  .round-btn:active{ transform:scale(0.95); background:var(--copper-bright); }
  .round-minus{
    width:48px; height:48px; border-radius:50%;
    background:var(--panel); color:var(--cream-dim); border:1px solid var(--line);
    font-size:20px;
  }

  .save-btn{
    width:100%; padding:16px; border-radius:14px; border:none;
    background:var(--green); color:var(--ink-2); font-size:16px; font-weight:700;
  }
  .save-btn:active{ filter:brightness(1.1); }

  /* Bottom nav */
  .navbar{
    display:flex; border-top:1px solid var(--line);
    background:var(--ink-2);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:10px 0 8px; color:var(--cream-dim); font-size:11px;
    background:none; border:none;
  }
  .nav-btn .navicon{ font-size:19px; line-height:1; }
  .nav-btn.active{ color:var(--copper-bright); }

  /* History (kept, simplified) */
  .hist-block-card{
    background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:16px; margin-bottom:12px;
  }
  .hist-block-title{ font-size:16px; font-weight:600; color:var(--cream); margin-bottom:2px; }
  .hist-day-tag{ font-size:11px; color:var(--cream-dim); letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; }
  .hist-entry{
    display:flex; justify-content:space-between; align-items:center;
    padding:9px 0; border-top:1px solid var(--line);
  }
  .hist-entry:first-of-type{ border-top:none; }
  .hist-date{ font-size:13px; color:var(--cream-dim); }
  .hist-rounds{ font-size:14px; color:var(--cream); font-weight:600; }
  .hist-weights{ font-size:12px; color:var(--cream-dim); }
  .pill{
    font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; margin-left:8px;
  }
  .pill.up{ background:rgba(212,162,76,0.18); color:var(--amber); }
  .pill.hold{ background:rgba(126,148,104,0.18); color:var(--green); }

  .toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
    background:var(--panel-2); border:1px solid var(--line); color:var(--cream);
    padding:10px 18px; border-radius:30px; font-size:13px; box-shadow:var(--shadow);
    opacity:0; transition:opacity 0.25s; pointer-events:none; z-index:50;
    max-width: 85vw; text-align:center;
  }
  .toast.show{ opacity:1; }

  a{ color:inherit; }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="topbar">
      <div class="brand">Density<span class="sub">Rep Block Tracker</span></div>
    </div>

    <div class="week-banner">
      <div class="week-info">
        <div class="week-num" id="week-num-display">Week 1</div>
        <div class="week-target" id="week-target-display">Target: 9 rounds</div>
      </div>
      <button class="week-advance-btn" onclick="advanceWeek()" id="week-advance-btn">Complete Week →</button>
    </div>

    <div id="home-content"></div>
  </div>

  <!-- BLOCK DETAIL -->
  <div class="screen" id="screen-block">
    <div id="block-scroll">
      <button class="back-btn" onclick="goTo('home')">‹ Today</button>
      <div class="block-header">
        <div class="block-header-name" id="block-header-name">Block</div>
        <div class="block-header-day" id="block-header-day">Day</div>
      </div>

      <div id="block-last-time-banner"></div>

      <div class="exercise-list" id="block-exercise-list"></div>

      <div class="round-counter-wrap">
        <div class="round-big" id="round-count">0</div>
        <div class="round-target-label" id="round-target-label">FULL ROUNDS &middot; TARGET 9</div>
        <div class="round-btn-row">
          <button class="round-minus" onclick="adjustRound(-1)">–</button>
          <button class="round-btn" onclick="adjustRound(1)">+1</button>
          <div style="width:48px;"></div>
        </div>
      </div>
    </div>
    <div id="block-save-wrap">
      <button class="save-btn" onclick="saveBlockSession()">Save</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="screen" id="screen-history">
    <div class="topbar">
      <div class="brand">History<span class="sub">Session Log</span></div>
    </div>
    <div id="history-content"></div>
  </div>

  <div class="navbar">
    <button class="nav-btn active" id="nav-home" onclick="goTo('home')">
      <span class="navicon">⌂</span>Today
    </button>
    <button class="nav-btn" id="nav-history" onclick="goTo('history')">
      <span class="navicon">▤</span>History
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------------- Data Model & Persistence ---------------- */
const STORAGE_KEY = 'density_program_v2';
const SESSIONS_KEY = 'density_sessions_v2';
const STATE_KEY = 'density_state_v2';
const OLD_PROGRAM_KEY = 'density_program_v1';
const OLD_SESSIONS_KEY = 'density_sessions_v1';

// Fixed program structure (not user-editable — this is Andy Speer's actual program).
// Only `weight` per exercise is mutable by the user during use.
const program = {
  days: [
    {
      id: 'day1', name: 'Day 1',
      blocks: [
        { id: 'd1b1', name: 'RDL / Press', exercises: [
          { name: 'RDL', reps: 6, weight: 20 },
          { name: 'Press', reps: 6, weight: 10 }
        ]},
        { id: 'd1b2', name: 'Lunge / Row', exercises: [
          { name: 'Lunge', reps: 6, weight: 15 },
          { name: 'Row', reps: 6, weight: 15 }
        ]}
      ]
    },
    {
      id: 'day2', name: 'Day 2',
      blocks: [
        { id: 'd2b1', name: 'Curls / Kickbacks / Flys', exercises: [
          { name: 'Curls', reps: 6, weight: 5 },
          { name: 'Kickbacks', reps: 6, weight: 5 },
          { name: 'Flys', reps: 6, weight: 5 }
        ]}
      ]
    },
    {
      id: 'day3', name: 'Day 3',
      blocks: [
        { id: 'd3b1', name: 'Squat / Jump Squat / Push Press', exercises: [
          { name: 'Squat', reps: 6, weight: 10 },
          { name: 'Jump Squat', reps: 4, weight: 0 },
          { name: 'Push Press', reps: 2, weight: 10 }
        ]},
        { id: 'd3b2', name: 'Chest Press / Row', exercises: [
          { name: 'Chest Press', reps: 6, weight: 15 },
          { name: 'Row', reps: 6, weight: 15 }
        ]}
      ]
    }
  ]
};

// Week -> round target. Week 4 = max effort, no fixed target (null).
const WEEK_TARGETS = { 1: 9, 2: 8, 3: 7, 4: null };
const MAX_WEEK = 4;

function loadWeights(){
  // Load just the weight overrides (exercise name -> weight) keyed by blockId, persisted separately
  // from the fixed program structure, so the program shape itself can never drift from the real plan.
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e){}
  return {};
}
function saveWeights(w){ localStorage.setItem(STORAGE_KEY, JSON.stringify(w)); }

function loadSessions(){
  try {
    const raw = localStorage.getItem(SESSIONS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e){}
  return [];
}
function saveSessions(s){ localStorage.setItem(SESSIONS_KEY, JSON.stringify(s)); }

function loadState(){
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e){}
  return { currentWeek: 1 };
}
function saveState(s){ localStorage.setItem(STATE_KEY, JSON.stringify(s)); }

// One-time migration: if old v1 program data exists (from the previous version of this app)
// and the new weight-override store doesn't exist yet, carry weights forward so nothing is lost.
function migrateFromV1IfNeeded(){
  const alreadyMigrated = localStorage.getItem(STORAGE_KEY);
  if (alreadyMigrated) return;
  try {
    const oldRaw = localStorage.getItem(OLD_PROGRAM_KEY);
    if (!oldRaw) return;
    const oldProgram = JSON.parse(oldRaw);
    const weights = {};
    (oldProgram.days || []).forEach(day=>{
      (day.blocks || []).forEach(block=>{
        weights[block.id] = {};
        (block.exercises || []).forEach(ex=>{
          weights[block.id][ex.name] = ex.weight;
        });
      });
    });
    saveWeights(weights);
  } catch(e){}
}

function migrateSessionsFromV1IfNeeded(){
  const alreadyMigrated = localStorage.getItem(SESSIONS_KEY);
  if (alreadyMigrated) return;
  try {
    const oldRaw = localStorage.getItem(OLD_SESSIONS_KEY);
    if (!oldRaw) return;
    const oldSessions = JSON.parse(oldRaw);
    saveSessions(oldSessions);
  } catch(e){}
}

migrateFromV1IfNeeded();
migrateSessionsFromV1IfNeeded();

let weightOverrides = loadWeights(); // { blockId: { exerciseName: weight } }
let sessions = loadSessions();
let state = loadState();

// Apply weight overrides onto the fixed program in memory
function applyWeightOverrides(){
  program.days.forEach(day=>{
    day.blocks.forEach(block=>{
      const ov = weightOverrides[block.id];
      if (!ov) return;
      block.exercises.forEach(ex=>{
        if (ov[ex.name] !== undefined) ex.weight = ov[ex.name];
      });
    });
  });
}
applyWeightOverrides();

function persistWeightsForBlock(block){
  weightOverrides[block.id] = {};
  block.exercises.forEach(ex=>{ weightOverrides[block.id][ex.name] = ex.weight; });
  saveWeights(weightOverrides);
}

function findBlockAndDay(blockId){
  for (const day of program.days){
    const block = day.blocks.find(b=>b.id===blockId);
    if (block) return {day, block};
  }
  return null;
}

/* ---------------- Week / threshold logic ---------------- */
function getTargetForWeek(week){
  return WEEK_TARGETS[week] !== undefined ? WEEK_TARGETS[week] : 7; // fallback safety
}

function getLastSession(blockId){
  const past = sessions.filter(s=>s.blockId===blockId).sort((a,b)=> new Date(b.dateISO) - new Date(a.dateISO));
  return past.length ? past[0] : null;
}

// Indicator is based on the CURRENT week's target compared against the last logged round count.
function getIndicator(blockId){
  const last = getLastSession(blockId);
  if (!last) return { type:'new', label:'NOT STARTED' };
  const target = getTargetForWeek(state.currentWeek);
  if (target === null){
    return { type:'new', label:'MAX EFFORT WEEK' };
  }
  if (last.rounds >= target){
    return { type:'up', label:'↑ GO UP IN WEIGHT' };
  }
  return { type:'hold', label:'HOLD WEIGHT' };
}

function advanceWeek(){
  state.currentWeek = state.currentWeek >= MAX_WEEK ? 1 : state.currentWeek + 1;
  saveState(state);
  showToast(state.currentWeek === 1 ? 'New cycle — back to Week 1' : `Moved to Week ${state.currentWeek}`);
  renderHome();
}

/* ---------------- Navigation ---------------- */
function goTo(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+screen).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const navMap = {home:'nav-home', history:'nav-history'};
  if (navMap[screen]) document.getElementById(navMap[screen]).classList.add('active');
  if (screen==='home') renderHome();
  if (screen==='history') renderHistory();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ---------------- HOME ---------------- */
function renderHome(){
  const target = getTargetForWeek(state.currentWeek);
  document.getElementById('week-num-display').textContent = 'Week ' + state.currentWeek;
  document.getElementById('week-target-display').textContent = target === null ? 'Max effort — no fixed target' : `Target: ${target} rounds`;
  document.getElementById('week-advance-btn').textContent = state.currentWeek >= MAX_WEEK ? 'Restart Cycle →' : 'Complete Week →';

  const el = document.getElementById('home-content');
  el.innerHTML = '';

  program.days.forEach(day=>{
    const group = document.createElement('div');
    group.className = 'day-group';

    const label = document.createElement('div');
    label.className = 'day-group-label';
    label.textContent = day.name;
    group.appendChild(label);

    day.blocks.forEach(block=>{
      const last = getLastSession(block.id);
      const ind = getIndicator(block.id);
      const row = document.createElement('button');
      row.className = 'block-row';
      row.onclick = ()=> openBlock(block.id);

      const roundsHtml = last
        ? `<div class="block-row-rounds">${last.rounds}<span class="unit"> rds</span></div>`
        : `<div class="block-row-rounds" style="color:var(--cream-dim); font-size:15px;">—</div>`;

      row.innerHTML = `
        <div class="block-row-main">
          <div class="block-row-name">${escapeHtml(block.name)}</div>
          <div class="block-row-meta">${last ? formatDate(last.dateISO) : 'Not started yet'}</div>
        </div>
        <div class="block-row-right">
          ${roundsHtml}
          <span class="indicator ${ind.type}">${ind.label}</span>
        </div>
      `;
      group.appendChild(row);
    });

    el.appendChild(group);
  });
}

/* ---------------- BLOCK DETAIL SCREEN ---------------- */
let activeBlockId = null;
let roundCount = 0;
let currentExerciseWeights = {};

function openBlock(blockId){
  const found = findBlockAndDay(blockId);
  if (!found) return;
  activeBlockId = blockId;
  roundCount = 0;
  currentExerciseWeights = {};
  found.block.exercises.forEach(ex=> currentExerciseWeights[ex.name] = ex.weight);

  document.getElementById('block-header-name').textContent = found.block.name;
  document.getElementById('block-header-day').textContent = found.day.name;
  renderBlockExerciseList(found.block);
  renderLastTimeBanner(blockId);

  const target = getTargetForWeek(state.currentWeek);
  document.getElementById('round-target-label').textContent = target === null
    ? 'FULL ROUNDS · MAX EFFORT'
    : `FULL ROUNDS · TARGET ${target}`;

  document.getElementById('round-count').textContent = '0';

  goTo('block');
}

function renderLastTimeBanner(blockId){
  const el = document.getElementById('block-last-time-banner');
  const last = getLastSession(blockId);
  if (!last){
    el.innerHTML = `<div class="last-time-banner">First time logging this block — go get a baseline!</div>`;
    return;
  }
  const ind = getIndicator(blockId);
  const cls = ind.type === 'up' ? 'up' : (ind.type === 'hold' ? 'hold' : '');
  el.innerHTML = `<div class="last-time-banner ${cls}">Last time (${formatDate(last.dateISO)}): <strong>${last.rounds} rounds</strong> — ${ind.label.toLowerCase()}</div>`;
}

function renderBlockExerciseList(block){
  const el = document.getElementById('block-exercise-list');
  el.innerHTML = block.exercises.map(ex => `
    <div class="exercise-row">
      <div>
        <div class="ex-name">${escapeHtml(ex.name)}</div>
        <div class="ex-meta">${ex.reps} reps</div>
      </div>
      <div>
        <input class="ex-weight-edit" type="number" inputmode="decimal" value="${currentExerciseWeights[ex.name]}"
          onchange="currentExerciseWeights['${escapeJs(ex.name)}'] = parseFloat(this.value)||0" /> lb
      </div>
    </div>
  `).join('');
}

function adjustRound(delta){
  roundCount = Math.max(0, roundCount + delta);
  document.getElementById('round-count').textContent = roundCount;
  if (navigator.vibrate) navigator.vibrate(15);
}

function saveBlockSession(){
  if (!activeBlockId) return;
  const session = {
    id: 'sess_' + Date.now(),
    dateISO: new Date().toISOString(),
    blockId: activeBlockId,
    week: state.currentWeek,
    weights: Object.assign({}, currentExerciseWeights),
    rounds: roundCount
  };
  sessions.push(session);
  saveSessions(sessions);

  const found = findBlockAndDay(activeBlockId);
  if (found){
    found.block.exercises.forEach(ex=>{
      if (currentExerciseWeights[ex.name] !== undefined){
        ex.weight = currentExerciseWeights[ex.name];
      }
    });
    persistWeightsForBlock(found.block);
  }

  showToast(`Saved — ${roundCount} round${roundCount===1?'':'s'} logged`);
  activeBlockId = null;
  goTo('home');
}

/* ---------------- HISTORY ---------------- */
function renderHistory(){
  const el = document.getElementById('history-content');
  el.innerHTML = '';

  const allBlocks = [];
  program.days.forEach(day=> day.blocks.forEach(block=> allBlocks.push({day, block})));

  if (sessions.length === 0){
    el.innerHTML = `<div class="empty-state"><span class="big-emoji">⏱</span>No sessions logged yet.<br>Save a block to see it here.</div>`;
    return;
  }

  let any = false;
  allBlocks.forEach(({day, block})=>{
    const blockSessions = sessions.filter(s=>s.blockId===block.id).sort((a,b)=> new Date(b.dateISO)-new Date(a.dateISO));
    if (blockSessions.length === 0) return;
    any = true;

    const card = document.createElement('div');
    card.className = 'hist-block-card';

    const entries = blockSessions.map(s=>{
      let pill = '';
      const target = WEEK_TARGETS[s.week];
      if (target !== null && target !== undefined && s.rounds >= target) pill = '<span class="pill up">↑ UP</span>';
      else if (target !== null && target !== undefined && s.rounds === target) pill = '<span class="pill hold">HOLD</span>';
      const weightsStr = Object.entries(s.weights).map(([n,w])=>`${n} ${w}lb`).join(' · ');
      return `
        <div class="hist-entry">
          <div>
            <div class="hist-date">${formatDate(s.dateISO)} &middot; Wk ${s.week !== undefined ? s.week : '–'}</div>
            <div class="hist-weights">${escapeHtml(weightsStr)}</div>
          </div>
          <div class="hist-rounds">${s.rounds} rounds ${pill}</div>
        </div>
      `;
    }).join('');

    card.innerHTML = `
      <div class="hist-block-title">${escapeHtml(block.name)}</div>
      <div class="hist-day-tag">${escapeHtml(day.name)}</div>
      ${entries}
    `;
    el.appendChild(card);
  });

  if (!any){
    el.innerHTML = `<div class="empty-state"><span class="big-emoji">⏱</span>No sessions logged yet.<br>Save a block to see it here.</div>`;
  }
}

/* ---------------- Helpers ---------------- */
function formatDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, {month:'short', day:'numeric', year: (d.getFullYear()!==new Date().getFullYear()) ? 'numeric' : undefined});
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeJs(str){ return String(str).replace(/'/g, "\\'"); }

/* ---------------- Service worker registration ---------------- */
if ('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

/* ---------------- Init ---------------- */
renderHome();
</script>
</body>
</html>
